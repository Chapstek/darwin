<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Darwin Chapuswike’s portfolio: skills, certifications, and experience. Explore my work and achievements!">
    <meta name="keywords" content="Best IT Engineer in Zambia, Best Software Developer in Zambia, Experienced IT Professional in Zambia, Best IT Engineer in Livingstone, Best Software Developer in Livingstone, Experienced IT Professional in Livingstone">
    <meta name="author" content="Darwin Chapuswike">
    <link rel="icon" href="index_logo.png" type="image/png">
    <title data-lang="en">Darwin Chapuswike - IT Professional</title>
    <title data-lang="fr">Darwin Chapuswike - Professionnel de l'informatique</title>
    <title data-lang="sw">Darwin Chapuswike - Mtaalamu wa IT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            background-color: #e9ecef;
            color: #333;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 720px;
            margin: auto;
            padding: 15px;
        }
        header, nav, section, footer { /* same as before */ }
        /* ... (keeping previous styles) ... */

        /* Tetris Mobile Controls */
        .tetris-controls {
            display: none;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 15px auto;
            max-width: 320px;
        }
        .tetris-controls button {
            padding: 12px 8px;
            font-size: 1em;
            font-weight: bold;
            background: #004182;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .tetris-controls button:active {
            background: #dc3545;
            transform: scale(0.95);
        }
        .tetris-controls .rotate-btn {
            grid-column: span 3;
        }

        @media (max-width: 720px) {
            .tetris-controls {
                display: grid;
            }
            #tetris-canvas {
                width: 100%;
                max-width: 280px;
                height: auto;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ... Header and Nav same as before ... -->

    <div class="container">
        <section id="welcome-section"> <!-- same --> </section>

        <section id="games-section">
            <h2 data-lang="en">Play Games!</h2>
            <h2 data-lang="fr">Jouez aux jeux !</h2>
            <h2 data-lang="sw">Cheza Michezo!</h2>

            <div class="game-selector">
                <button class="game-btn active" data-game="pong" onclick="switchGame('pong')">Pong</button>
                <button class="game-btn" data-game="tetris" onclick="switchGame('tetris')">Tetris</button>
            </div>

            <!-- Pong Container (same) -->
            <div id="pong-container" class="game-container active"> <!-- ... existing pong ... --> </div>

            <!-- Tetris Container -->
            <div id="tetris-container" class="game-container">
                <div id="tetris-score" data-lang="en">Score: 0  Lines: 0</div>
                <div id="tetris-score" data-lang="fr">Score : 0  Lignes : 0</div>
                <div id="tetris-score" data-lang="sw">Alama: 0  Mistari: 0</div>
                
                <canvas id="tetris-canvas" width="240" height="480"></canvas>
                
                <!-- Mobile Controls -->
                <div class="tetris-controls" id="tetris-mobile-controls">
                    <button onclick="tetrisMove(-1)">←</button>
                    <button onclick="tetrisSoftDrop()">↓</button>
                    <button onclick="tetrisMove(1)">→</button>
                    <button class="rotate-btn" onclick="tetrisRotate()">↻ Rotate</button>
                    <button onclick="tetrisHardDrop()">Hard Drop (Space)</button>
                    <button onclick="toggleTetrisPause()">Pause / Resume</button>
                </div>

                <p data-lang="en" id="tetris-instructions">Keyboard: ← → ↓ ↑ Space | P<br>Mobile: Use buttons below</p>
                <p data-lang="fr" id="tetris-instructions">Clavier : ← → ↓ ↑ Espace | P<br>Mobile : Utilisez les boutons</p>
                <p data-lang="sw" id="tetris-instructions">Kibodi: ← → ↓ ↑ Space | P<br>Simu: Tumia vitufe hapa chini</p>
            </div>
        </section>
    </div>

    <!-- WhatsApp and Footer same -->

    <script>
        // ============== LANGUAGE SWITCHER ==============
        function changeLanguage() {
            const selectedLang = document.getElementById('language-select').value;
            localStorage.setItem('preferredLang', selectedLang);
            updateLanguage(selectedLang);
        }

        function updateLanguage(lang) {
            document.querySelectorAll('[data-lang]').forEach(element => {
                element.classList.remove('active');
                if (element.getAttribute('data-lang') === lang) {
                    element.classList.add('active');
                }
            });

            document.title = document.querySelector(`title[data-lang="${lang}"]`).textContent;

            const descriptions = {
                en: "Darwin Chapuswike’s portfolio: skills, certifications, and experience. Explore my work and achievements!",
                fr: "Portefeuille de Darwin Chapuswike : compétences, certifications et expérience. Découvrez mon travail et mes réalisations !",
                sw: "Portifolio ya Darwin Chapuswike: ujuzi, vyeti, na uzoefu. Chunguza kazi yangu na mafanikio yangu!"
            };
            const keywords = {
                en: "Best IT Engineer in Zambia, Best Software Developer in Zambia, Experienced IT Professional in Zambia, Best IT Engineer in Livingstone, Best Software Developer in Livingstone, Experienced IT Professional in Livingstone",
                fr: "Meilleur ingénieur IT en Zambie, Meilleur développeur logiciel en Zambie, Professionnel IT expérimenté en Zambie, Meilleur ingénieur IT à Livingstone, Meilleur développeur logiciel à Livingstone, Professionnel IT expérimenté à Livingstone",
                sw: "Mhandisi Bora wa IT nchini Zambia, Mwandishi Bora wa Programu nchini Zambia, Mtaalamu wa IT mwenye Uzoefu nchini Zambia, Mhandisi Bora wa IT mjini Livingstone, Mwandishi Bora wa Programu mjini Livingstone, Mtaalamu wa IT mwenye Uzoefu mjini Livingstone"
            };
            document.querySelector('meta[name="description"]').setAttribute('content', descriptions[lang]);
            document.querySelector('meta[name="keywords"]').setAttribute('content', keywords[lang]);

            if (currentGame === 'pong') updatePongScoreDisplay();
            else updateTetrisScoreDisplay();
        }

        // ============== GAME SWITCHER ==============
        let currentGame = 'pong';

        function switchGame(game) {
            currentGame = game;
            document.querySelectorAll('.game-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.game === game);
            });
            document.getElementById('pong-container').classList.toggle('active', game === 'pong');
            document.getElementById('tetris-container').classList.toggle('active', game === 'tetris');

            if (game === 'pong') {
                if (!pongInitialized) initPong();
            } else {
                if (!tetrisInitialized) initTetris();
            }
        }

        // ============== PONG GAME ==============
        let pongInitialized = false;
        let pongCanvas, pongCtx, playerPaddle, aiPaddle, ball, pongKeys, pongGameRunning, pongTouchActive, pongTouchY;

        function initPong() {
            pongCanvas = document.getElementById('pong-canvas');
            pongCtx = pongCanvas.getContext('2d');
            pongCanvas.width = 600;
            pongCanvas.height = 400;

            const paddleWidth = 10;
            const paddleHeight = 60;

            playerPaddle = { x: 10, y: pongCanvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, speed: 6, score: 0 };
            aiPaddle = { x: pongCanvas.width - paddleWidth - 10, y: pongCanvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, speed: 3.5, score: 0 };
            ball = { x: pongCanvas.width / 2, y: pongCanvas.height / 2, size: 10, speedX: 5, speedY: 3 };

            pongKeys = { ArrowUp: false, ArrowDown: false };
            pongGameRunning = true;
            pongTouchActive = false;
            pongTouchY = 0;

            // Keyboard
            document.addEventListener('keydown', pongKeyDown);
            document.addEventListener('keyup', pongKeyUp);

            // Touch
            pongCanvas.addEventListener('touchstart', pongTouchStart);
            pongCanvas.addEventListener('touchmove', pongTouchMove);
            pongCanvas.addEventListener('touchend', pongTouchEnd);

            pongInitialized = true;
            requestAnimationFrame(pongGameLoop);
        }

        function pongKeyDown(e) {
            if (currentGame !== 'pong') return;
            if (e.key === 'ArrowUp') pongKeys.ArrowUp = true;
            if (e.key === 'ArrowDown') pongKeys.ArrowDown = true;
        }
        function pongKeyUp(e) {
            if (e.key === 'ArrowUp') pongKeys.ArrowUp = false;
            if (e.key === 'ArrowDown') pongKeys.ArrowDown = false;
        }

        function pongTouchStart(e) {
            if (currentGame !== 'pong') return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = pongCanvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            pongTouchY = touch.clientY - rect.top;
            if (touchX < pongCanvas.width / 2) pongTouchActive = true;
        }
        function pongTouchMove(e) {
            if (currentGame !== 'pong' || !pongTouchActive) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = pongCanvas.getBoundingClientRect();
            pongTouchY = touch.clientY - rect.top;
            playerPaddle.y = pongTouchY - playerPaddle.height / 2;
            if (playerPaddle.y < 0) playerPaddle.y = 0;
            if (playerPaddle.y > pongCanvas.height - playerPaddle.height) playerPaddle.y = pongCanvas.height - playerPaddle.height;
        }
        function pongTouchEnd() {
            pongTouchActive = false;
        }

        function updatePongScoreDisplay() {
            const lang = localStorage.getItem('preferredLang') || 'en';
            const scoreEl = document.querySelector(`#pong-container .score-display[data-lang="${lang}"]`);
            if (scoreEl) {
                const text = lang === 'en' ? `Player: ${playerPaddle.score} | AI: ${aiPaddle.score}` :
                            lang === 'fr' ? `Joueur : ${playerPaddle.score} | IA : ${aiPaddle.score}` :
                            `Mchezaji: ${playerPaddle.score} | AI: ${aiPaddle.score}`;
                scoreEl.textContent = text;
            }
        }

        function pongCheckGameOver() {
            if (playerPaddle.score >= 5 || aiPaddle.score >= 5) {
                pongGameRunning = false;
                const lang = localStorage.getItem('preferredLang') || 'en';
                const scoreEl = document.querySelector(`#pong-container .score-display[data-lang="${lang}"]`);
                if (scoreEl) {
                    const msg = lang === 'en' ? (playerPaddle.score >= 5 ? 'You Win! Refresh to play again.' : 'AI Wins! Refresh to play again.') :
                                lang === 'fr' ? (playerPaddle.score >= 5 ? 'Vous avez gagné ! Rafraîchissez.' : 'L’IA a gagné ! Rafraîchissez.') :
                                (playerPaddle.score >= 5 ? 'Umepata Ushindi!' : 'AI Imeshinda!');
                    scoreEl.textContent = msg;
                }
            }
        }

        function pongUpdate() {
            if (!pongGameRunning) return;

            // Player
            if (!pongTouchActive) {
                if (pongKeys.ArrowUp && playerPaddle.y > 0) playerPaddle.y -= playerPaddle.speed;
                if (pongKeys.ArrowDown && playerPaddle.y < pongCanvas.height - playerPaddle.height) playerPaddle.y += playerPaddle.speed;
            }

            // AI
            if (aiPaddle.y + aiPaddle.height / 2 < ball.y) aiPaddle.y += aiPaddle.speed;
            else if (aiPaddle.y + aiPaddle.height / 2 > ball.y) aiPaddle.y -= aiPaddle.speed;

            // Ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            if (ball.y <= 0 || ball.y >= pongCanvas.height - ball.size) ball.speedY = -ball.speedY;

            // Paddle collision
            if (
                (ball.x <= playerPaddle.x + playerPaddle.width && ball.y + ball.size >= playerPaddle.y && ball.y <= playerPaddle.y + playerPaddle.height) ||
                (ball.x + ball.size >= aiPaddle.x && ball.y + ball.size >= aiPaddle.y && ball.y <= aiPaddle.y + aiPaddle.height)
            ) {
                ball.speedX = -ball.speedX * 1.02;
            }

            // Scoring
            if (ball.x <= 0) {
                aiPaddle.score++;
                resetPongBall();
                updatePongScoreDisplay();
                pongCheckGameOver();
            }
            if (ball.x >= pongCanvas.width - ball.size) {
                playerPaddle.score++;
                resetPongBall();
                updatePongScoreDisplay();
                pongCheckGameOver();
            }
        }

        function resetPongBall() {
            ball.x = pongCanvas.width / 2;
            ball.y = pongCanvas.height / 2;
            ball.speedX = -ball.speedX;
            ball.speedY = (Math.random() - 0.5) * 6;
        }

        function pongDraw() {
            pongCtx.fillStyle = '#f8f9fa';
            pongCtx.fillRect(0, 0, pongCanvas.width, pongCanvas.height);

            pongCtx.fillStyle = '#004182';
            pongCtx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            pongCtx.fillRect(aiPaddle.x, aiPaddle.y, aiPaddle.width, aiPaddle.height);

            pongCtx.fillStyle = '#dc3545';
            pongCtx.fillRect(ball.x, ball.y, ball.size, ball.size);

            // Center line
            pongCtx.setLineDash([5, 15]);
            pongCtx.beginPath();
            pongCtx.moveTo(pongCanvas.width / 2, 0);
            pongCtx.lineTo(pongCanvas.width / 2, pongCanvas.height);
            pongCtx.strokeStyle = '#666';
            pongCtx.stroke();
            pongCtx.setLineDash([]);
        }

        function pongGameLoop() {
            if (currentGame === 'pong') {
                pongUpdate();
                pongDraw();
            }
            requestAnimationFrame(pongGameLoop);
        }

        // ============== TETRIS GAME ==============
        let tetrisInitialized = false;
        let tetrisCanvas, tetrisCtx, tetrisBoard, currentPiece, tetrisScore, linesCleared, dropInterval, lastDropTime, tetrisPaused, tetrisGameOver;

        const TETRIS_COLS = 10;
        const TETRIS_ROWS = 20;
        const BLOCK_SIZE = 24;

        const TETRIS_PIECES = [ /* same as before */ ];

        function initTetris() {
            tetrisCanvas = document.getElementById('tetris-canvas');
            tetrisCtx = tetrisCanvas.getContext('2d');
            tetrisCanvas.width = TETRIS_COLS * BLOCK_SIZE;
            tetrisCanvas.height = TETRIS_ROWS * BLOCK_SIZE;

            tetrisBoard = Array.from({length: TETRIS_ROWS}, () => Array(TETRIS_COLS).fill(0));
            tetrisScore = 0;
            linesCleared = 0;
            dropInterval = 800;
            lastDropTime = Date.now();
            tetrisPaused = false;
            tetrisGameOver = false;

            spawnPiece();
            tetrisInitialized = true;

            document.addEventListener('keydown', handleTetrisKey);
            requestAnimationFrame(tetrisGameLoop);
        }

        // ... keep all existing Tetris functions: spawnPiece, collision, mergePiece, clearLines, rotatePiece, hardDrop, lockPiece, etc. ...

        function tetrisMove(dir) {
            if (!currentPiece || tetrisGameOver || tetrisPaused) return;
            currentPiece.x += dir;
            if (collision()) currentPiece.x -= dir;
        }

        function tetrisSoftDrop() {
            if (!currentPiece || tetrisGameOver || tetrisPaused) return;
            currentPiece.y++;
            if (collision()) {
                currentPiece.y--;
                lockPiece();
            }
            lastDropTime = Date.now(); // reset timer
        }

        function tetrisRotate() {
            if (!currentPiece || tetrisGameOver || tetrisPaused) return;
            rotatePiece();
        }

        function tetrisHardDrop() {
            if (!currentPiece || tetrisGameOver || tetrisPaused) return;
            hardDrop();
        }

        function toggleTetrisPause() {
            if (tetrisGameOver) return;
            tetrisPaused = !tetrisPaused;
        }

        // Keyboard handler (same)
        function handleTetrisKey(e) {
            if (currentGame !== 'tetris' || tetrisGameOver || tetrisPaused) return;
            // ... existing key handling ...
        }

        // Game loop and drawing functions remain the same

        // ============== INITIALIZATION ==============
        document.addEventListener("DOMContentLoaded", () => {
            // ... existing initialization code ...

            // Start with Pong
            initPong();

            const savedLang = localStorage.getItem('preferredLang') || 'en';
            document.getElementById('language-select').value = savedLang;
            updateLanguage(savedLang);
        });
    </script>
</body>
</html>
